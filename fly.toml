# fly.toml - Generated for controle-producao
app = "controle-producao"
primary_region = "gru"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "data"
  destination = "/data"

[env]
  PORT = "8080"
  DATABASE_URL = "file:/data/controle.db"
  NODE_ENV = "production"